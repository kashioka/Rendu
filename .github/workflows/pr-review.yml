name: AI PR Review

# Triggered only when kashioka comments `/review` on an external contributor's PR.
on:
  issue_comment:
    types: [created]

permissions:
  pull-requests: write
  contents: read
  issues: read

jobs:
  ai-review:
    runs-on: ubuntu-latest
    # PRのコメントで /review と書いたときだけ発動、外部PR（fork）のみ対象
    if: |
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '/review') &&
      github.event.comment.user.login == 'kashioka' &&
      github.event.issue.user.login != 'kashioka'

    steps:
      - name: Get PR info
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_DATA=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.issue.number }})
          HEAD_SHA=$(echo "$PR_DATA" | python3 -c "import sys,json;d=json.load(sys.stdin);print(d['head']['sha'])")
          BASE_SHA=$(echo "$PR_DATA" | python3 -c "import sys,json;d=json.load(sys.stdin);print(d['base']['sha'])")
          PR_TITLE=$(echo "$PR_DATA" | python3 -c "import sys,json;d=json.load(sys.stdin);print(d['title'])")
          PR_AUTHOR=$(echo "$PR_DATA" | python3 -c "import sys,json;d=json.load(sys.stdin);print(d['user']['login'])")
          echo "head_sha=$HEAD_SHA" >> $GITHUB_OUTPUT
          echo "base_sha=$BASE_SHA" >> $GITHUB_OUTPUT
          echo "pr_title=$PR_TITLE" >> $GITHUB_OUTPUT
          echo "pr_author=$PR_AUTHOR" >> $GITHUB_OUTPUT

      - name: Get PR diff via API
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DIFF=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.issue.number }}/files \
            | python3 -c "
          import sys, json
          files = json.load(sys.stdin)
          result = []
          total = 0
          for f in files:
              ext = f['filename'].split('.')[-1]
              if ext in ['ts','tsx','js','jsx','rs','py','go']:
                  patch = f.get('patch','')
                  result.append(f'### {f[\"filename\"]}\n{patch}')
                  total += len(patch)
                  if total > 12000:
                      break
          print('\n'.join(result))
          ")
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Review by Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_DIFF: ${{ steps.diff.outputs.diff }}
          PR_TITLE: ${{ steps.pr.outputs.pr_title }}
          PR_AUTHOR: ${{ steps.pr.outputs.pr_author }}
        run: |
          REVIEW=$(python3 - <<'PYEOF'
          import os, json, urllib.request

          diff = os.environ.get("PR_DIFF", "")
          title = os.environ.get("PR_TITLE", "")
          author = os.environ.get("PR_AUTHOR", "")

          prompt = f"""以下の外部コントリビュータのPRをコードレビューしてください。

PR タイトル: {title}
PR 作成者: {author}

## 変更差分
{diff}

## レビュー観点
- バグ・ロジックエラーの可能性
- 型安全性（TypeScript）
- パフォーマンス上の懸念
- 設計・構造の問題
- マージしてよいかの総合判断

## 出力フォーマット
🔴 **問題点** があれば箇条書き（マージブロッカーになるもの）
🟡 **改善提案** があれば箇条書き（あると良いもの）
✅ **良い点** があれば箇条書き
📝 **総評** を2〜3行で
🔀 **マージ推奨度**: ✅ 推奨 / 🟡 修正後推奨 / 🔴 非推奨

問題がなければ「✅ 特に問題なし」と記載してください。"""

          payload = {
            "model": "claude-sonnet-4-6",
            "max_tokens": 1500,
            "messages": [{"role": "user", "content": prompt}]
          }

          req = urllib.request.Request(
            "https://api.anthropic.com/v1/messages",
            data=json.dumps(payload).encode(),
            headers={
              "Content-Type": "application/json",
              "x-api-key": os.environ["ANTHROPIC_API_KEY"],
              "anthropic-version": "2023-06-01"
            }
          )
          with urllib.request.urlopen(req) as res:
            result = json.loads(res.read())
            print(result["content"][0]["text"])
          PYEOF
          )
          echo "REVIEW<<EOF" >> $GITHUB_ENV
          echo "$REVIEW" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Post review comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMENT="## 🤖 Claude (Anthropic) によるAIコードレビュー

${REVIEW}

---
*このコメントは \`/review\` コマンドによって自動生成されました。*"

          gh pr comment ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --body "$COMMENT"
