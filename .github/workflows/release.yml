name: Release

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-aarch64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: Rendu v__VERSION__
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

  checksums:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          DRAFT_TAG=$(gh api repos/$REPO/releases --jq '.[0].tag_name')
          RELEASE_ID=$(gh api repos/$REPO/releases --jq '.[0].id')
          mkdir assets
          gh release download "$DRAFT_TAG" --repo "$REPO" --dir assets || true

      - name: Generate checksums
        run: |
          cd assets
          sha256sum * > checksums.txt || shasum -a 256 * > checksums.txt
          cat checksums.txt

      - name: Upload checksums to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          DRAFT_TAG=$(gh api repos/$REPO/releases --jq '.[0].tag_name')
          gh release upload "$DRAFT_TAG" assets/checksums.txt --repo "$REPO" --clobber
